name: Bootstrap macOS

on:
  push:
    branches: [main]
    paths:
      - 'bootstrap/bootstrap-mac.sh'
      - '.github/workflows/bootstrap-mac.yml'
  workflow_dispatch:

jobs:
  mac:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - name: Remove untrusted pre-installed taps
        run: brew untap aws/tap 2>/dev/null || true

      - name: Run bootstrap
        run: echo "y" | bash bootstrap/bootstrap-mac.sh
        env:
          S_UPGRADE: 0
          S_CLEANUP: 0
